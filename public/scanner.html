<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AR Scanner</title>
    <style>
      body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; }
      .a-enter-vr { display: none !important; }
      #loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-family: sans-serif; font-size: 1.2rem; z-index: 10; pointer-events: none; }
      #close-btn { position: absolute; top: 20px; right: 20px; z-index: 100; background: rgba(255, 255, 255, 0.2); border: 2px solid white; color: white; border-radius: 50%; width: 40px; height: 40px; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    </style>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function() {
        const sceneEl = document.querySelector('a-scene');
        sceneEl.addEventListener('arReady', function () { document.getElementById('loader').style.display = 'none'; });
        document.getElementById('close-btn').addEventListener('click', function() {
          if (window.parent) window.parent.postMessage('close-scanner', '*');
        });
      });
    </script>
  </head>
  <body>
    <div id="loader">Cargando Escáner AR...</div>
    <button id="close-btn">×</button>
    
    <a-scene mindar-image="imageTargetSrc: targets.mind;" color-space="sRGB" renderer="colorManagement: true" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      <a-assets>
        <img id="img_0" src="GATETO.png" />
        <img id="img_1" src="gato inteligente.png" />
        <img id="img_2" src="images.jpg" />
        <img id="img_3" src="escudo_itt_grande.png" />
        <img id="img_4" src="tigres.png" />
        <img id="img_5" src="foto_profe arturo.png" />
        <img id="img_6" src="foto_eduuu-removebg-preview.png" />
        <img id="img_7" src="foto_de_leo-removebg-preview.png" />
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      
      <a-entity mindar-image-target="targetIndex: 0">
        <a-image src="#img_0" position="0 0 0" height="1" width="1"></a-image>
      </a-entity>
      <a-entity mindar-image-target="targetIndex: 1">
        <a-image src="#img_1" position="0 0 0" height="1" width="1"></a-image>
      </a-entity>
      <a-entity mindar-image-target="targetIndex: 2">
        <a-image src="#img_2" position="0 0 0" height="1" width="1"></a-image>
      </a-entity>
      <a-entity mindar-image-target="targetIndex: 3">
        <a-image src="#img_3" position="0 0 0" height="1" width="1"></a-image>
      </a-entity>
      <a-entity mindar-image-target="targetIndex: 4">
        <a-image src="#img_4" position="0 0 0" height="1" width="1"></a-image>
      </a-entity>
      <a-entity mindar-image-target="targetIndex: 5">
        <a-image src="#img_5" position="0 0 0" height="1" width="1"></a-image>
      </a-entity>
      <a-entity mindar-image-target="targetIndex: 6">
        <a-image src="#img_6" position="0 0 0" height="1" width="1"></a-image>
      </a-entity>
      <a-entity mindar-image-target="targetIndex: 7">
        <a-image src="#img_7" position="0 0 0" height="1" width="1"></a-image>
      </a-entity>
    </a-scene>
  </body>
</html>
